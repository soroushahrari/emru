<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="emru assistant splash">
  <style>
    .draw {
      fill: none;
      stroke-linecap: round;
      stroke-width: 4;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: emru-splash-draw 920ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .draw-mid {
      animation-delay: 130ms;
    }

    .draw-inner {
      animation-delay: 250ms;
    }

    .afterglow {
      transform-origin: 32px 32px;
      animation: emru-splash-afterglow 4.2s 1.2s ease-in-out infinite;
    }

    .halo {
      fill: url(#emru-splash-halo);
      opacity: 0;
      transform-origin: 32px 32px;
      animation: emru-splash-halo 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .spark {
      fill: #ffd77a;
      opacity: 0;
      transform-origin: center;
      animation: emru-splash-spark 680ms 460ms ease-out forwards;
    }

    @keyframes emru-splash-draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes emru-splash-halo {
      0% {
        opacity: 0;
        transform: scale(0.56);
      }
      45% {
        opacity: 0.48;
      }
      100% {
        opacity: 0;
        transform: scale(1.28);
      }
    }

    @keyframes emru-splash-spark {
      0% {
        opacity: 0;
        transform: scale(0.4);
      }
      55% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(1.25);
      }
    }

    @keyframes emru-splash-afterglow {
      0%,
      100% {
        opacity: 0.93;
      }
      50% {
        opacity: 0.74;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .draw,
      .afterglow,
      .halo,
      .spark {
        animation: none;
        opacity: 1;
      }
    }
  </style>
  <defs>
    <radialGradient id="emru-splash-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffd77a" stop-opacity="0.62" />
      <stop offset="1" stop-color="#ffd77a" stop-opacity="0" />
    </radialGradient>
  </defs>
  <circle class="halo" cx="32" cy="32" r="16" />
  <g class="afterglow">
    <path class="draw" d="M14 42c2 7 9 12 17 12 10 0 19-8 19-19" pathLength="1" stroke="#d4692a" />
    <path class="draw draw-mid" d="M20 38c2 4 6 7 11 7 7 0 13-6 13-13" pathLength="1" stroke="#e09060" />
    <path class="draw draw-inner" d="M28 34c1 2 2 3 4 3 3 0 5-2 5-5" pathLength="1" stroke="#ffd77a" />
  </g>
  <circle class="spark" cx="32" cy="32" r="2.4" />
</svg>
